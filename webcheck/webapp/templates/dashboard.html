{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Gryphon Academy</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="navbar">
    <img src="{% static 'images/logo.png' %}" alt="Logo" class="logo">
    <div>
        <a href="{% url 'index' %}">Home</a>
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>
</div>

<div class="container">
    <h2>Welcome to Your Dashboard</h2>
    <p style="margin:20px 0; color:#ccc;">Participate in DSA Contests, view rankings and manage your profile here!</p>

    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top:30px;">
        <a href="#" class="btn-card">Start New Contest</a>
        <a href="#" class="btn-card">View Leaderboard</a>
        <a href="#" class="btn-card">Profile</a>
    </div>
</div>

</body>
</html>
