{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Gryphon Academy</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="navbar">
    <img src="{% static 'images/logo.png' %}" alt="Logo" class="logo">
    <div>
        <a href="{% url 'index' %}">Home</a>
        <a href="{% url 'register' %}">Register</a>
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'admin_login' %}">Admin</a>
    </div>
</div>

<div class="container">
    <h2>Create Your Account</h2>
    <form method="POST">
    {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="email" name="email" placeholder="Email" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required><br>
        <input type="text" name="full_name" placeholder="Full Name" required><br>
        <input type="text" name="college_name" placeholder="College Name" required><br>
        <button type="submit">Register</button>
    </form>

    {% if messages %}
        {% for message in messages %}
            <p style="color: red;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <p style="margin-top:20px; color:#ccc;">Already have an account?
        <a href="{% url 'login' %}" style="color:#58a6ff; text-decoration:none;">Login</a>
    </p>
</div>

</body>
</html>
